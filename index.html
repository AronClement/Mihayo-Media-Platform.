<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihayo Media Platform</title>

    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-firestore-compat.js"></script>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    position: relative;
}

/* Containers - Responsive */
.container {
    max-width: 500px;
    margin: 40px auto;
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(10px);
    padding: 35px 30px;
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    transition: all 0.3s ease;
}

/* Dashboard */
.dashboard, #superDashboard, #userDashboard {
    max-width: 1300px;
    margin: 30px auto;
    background: rgba(255, 255, 255, 0.97);
    padding: 30px;
    border-radius: 32px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
}

.dashboard-header, #superDashboard > div:first-child, #userDashboard > div:first-child {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 3px solid #f0f0f0;
}

h2 {
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 10px;
}

h3 {
    font-size: 1.5rem;
    color: #333;
    margin: 30px 0 20px 0;
    padding-left: 10px;
    border-left: 5px solid #764ba2;
}

/* Forms */
.form-group {
    margin-bottom: 22px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #444;
    font-size: 0.95rem;
}

.form-group input, 
.form-group select,
textarea {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.3s;
    background: white;
}

.form-group input:focus,
.form-group select:focus,
textarea:focus {
    outline: none;
    border-color: #764ba2;
    box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
}

textarea {
    resize: vertical;
    min-height: 100px;
}

/* Buttons */
button, .logout-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 40px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
}

.logout-btn {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    box-shadow: 0 4px 12px rgba(245, 87, 108, 0.3);
}

/* Media Grid */
.media-grid, .feature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 25px;
    margin: 30px 0;
}

.media-card {
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    transition: all 0.3s ease;
    border: 1px solid rgba(118, 75, 162, 0.1);
}

.media-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
}

.media-card img,
.media-card video {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
}

.media-card a,
.media-card button {
    margin: 10px;
    padding: 8px 16px;
    font-size: 14px;
    display: inline-block;
}

.delete-btn {
    background: #dc3545;
    box-shadow: none;
}

/* Table Styles */
table {
    width: 100%;
    background: white;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    margin: 20px 0;
}

th {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 15px;
    text-align: left;
    font-weight: 600;
}

td {
    padding: 12px 15px;
    border-bottom: 1px solid #f0f0f0;
}

tr:hover {
    background: #f9f9ff;
}

/* Comments Section */
.comment {
    background: #f8f9fa;
    border-radius: 16px;
    padding: 20px;
    margin: 20px 0;
    border-left: 4px solid #764ba2;
}

.comment p {
    margin-bottom: 8px;
    color: #333;
    font-size: 1rem;
}

.comment small {
    color: #888;
    font-size: 0.8rem;
    display: block;
    margin-bottom: 12px;
}

.comment textarea {
    width: 100%;
    margin-top: 10px;
    border-radius: 12px;
    font-size: 14px;
}

/* Message Alerts */
.message {
    padding: 15px;
    border-radius: 12px;
    margin: 15px 0;
    display: none;
    font-weight: 500;
    text-align: center;
}

.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

/* File Input */
input[type="file"] {
    padding: 10px;
    border: 2px dashed #764ba2;
    border-radius: 12px;
    background: #faf9ff;
    margin: 15px 0;
    width: 100%;
}

/* Links */
a {
    color: #764ba2;
    text-decoration: none;
    font-weight: 500;
}

a:hover {
    text-decoration: underline;
}

/* Welcome Card */
.welcome-card, .placeholder-media {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    padding: 30px;
    border-radius: 24px;
    text-align: center;
    margin: 20px 0;
}

/* ========== RESPONSIVE DESIGN ========== */

/* Tablets (768px and below) */
@media (max-width: 768px) {
    body {
        padding: 15px;
    }
    
    .dashboard, #superDashboard, #userDashboard {
        padding: 20px;
        margin: 20px 10px;
    }
    
    .container {
        padding: 25px 20px;
        margin: 30px 15px;
    }
    
    .media-grid, .feature-grid {
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 15px;
    }
    
    h3 {
        font-size: 1.3rem;
    }
    
    button, .logout-btn {
        padding: 10px 20px;
        font-size: 14px;
    }
    
    table {
        font-size: 14px;
    }
    
    th, td {
        padding: 10px;
    }
}

/* Mobile phones (550px and below) */
@media (max-width: 550px) {
    body {
        padding: 10px;
    }
    
    .dashboard, #superDashboard, #userDashboard {
        padding: 15px;
        border-radius: 20px;
    }
    
    .dashboard-header, #superDashboard > div:first-child, #userDashboard > div:first-child {
        flex-direction: column;
        gap: 15px;
        align-items: stretch;
    }
    
    .dashboard-header button,
    #superDashboard > div:first-child button,
    #userDashboard > div:first-child button {
        width: 100%;
    }
    
    .media-grid, .feature-grid {
        grid-template-columns: 1fr;
        gap: 20px;
    }
    
    .media-card img,
    .media-card video {
        height: 180px;
    }
    
    .form-group input, 
    .form-group select,
    textarea {
        padding: 10px 14px;
        font-size: 14px;
    }
    
    button {
        padding: 12px;
        width: 100%;
    }
    
    /* Make table scrollable on mobile */
    table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
    }
    
    .comment {
        padding: 15px;
    }
    
    .comment textarea {
        font-size: 13px;
    }
    
    h2 {
        font-size: 1.6rem;
    }
    
    .container {
        padding: 20px 15px;
    }
}

/* Small phones (400px and below) */
@media (max-width: 400px) {
    .media-card img,
    .media-card video {
        height: 150px;
    }
    
    .comment p {
        font-size: 0.9rem;
    }
    
    .form-group label {
        font-size: 0.85rem;
    }
    
    .dashboard, #superDashboard, #userDashboard {
        padding: 12px;
    }
}

/* Desktop and above (1200px+) */
@media (min-width: 1200px) {
    .dashboard, #superDashboard, #userDashboard {
        max-width: 1400px;
        padding: 40px;
    }
    
    .media-grid {
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 30px;
    }
    
    .media-card img,
    .media-card video {
        height: 220px;
    }
}

/* Print styles (optional) */
@media print {
    body {
        background: white;
        padding: 0;
    }
    button, .logout-btn {
        display: none;
    }
}
    </style>
</head>
<body>

<!-- Login Page -->
<div class="container" id="loginPage">
    <h2>Mihayo Media Platform</h2>
    <div id="loginMessage" class="message"></div>
    <div class="form-group"><label>User's name</label><input type="text" id="loginUsername" placeholder="superadmin"></div>
    <div class="form-group"><label>Password</label><input type="password" id="loginPassword"></div>
    <button onclick="handleLogin()" style="width:100%;">Login</button>
    <p style="text-align:center; margin-top:20px;">You don't have account? <a href="#" onclick="showRegister()">Register here</a></p>
</div>

<!-- Register Page -->
<div class="container" id="registerPage" style="display:none;">
    <h2>Register</h2>
    <div id="registerMessage" class="message"></div>
    <div class="form-group"><label>Full Name</label><input type="text" id="regFullName"></div>
    <div class="form-group"><label>Phone Number</label><input type="tel" id="regPhone"></div>
    <div class="form-group"><label>Completion Year</label><input type="number" id="regYear"></div>
    <button onclick="handleRegister()" style="width:100%;">Register and Login</button>
    <p style="text-align:center; margin-top:20px;"><a href="#" onclick="showLogin()">Back to Login</a></p>
</div>

<!-- Super Admin Dashboard -->
<div class="container" id="superDashboard" style="display:none;">
    <div style="display:flex; justify-content:space-between;">
        <h2>Super Admin Panel</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <h3>Upload Media</h3>
    <input type="file" id="uploadFile" accept="image/*,video/*">
    <button onclick="uploadMedia()">⬆ Upload</button>

    <h3>Uploaded Media</h3>
    <div class="media-grid" id="mediaGrid"></div>

    <h3>List of users</h3>
    <table id="usersTable"><thead><tr><th>Name</th><th>Phone number</th><th>Completion Year</th></tr></thead><tbody></tbody></table>

    <h3>User Comments</h3>
    <div id="commentsList"></div>
</div>

<!-- User Dashboard -->
<div class="container" id="userDashboard" style="display:none;">
    <div style="display:flex; justify-content:space-between;">
        <h2>Dashboard Yako</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    <div class="media-grid" id="userMediaGrid"></div>

    <h3>Comment</h3>
    <textarea id="userComment" rows="3" placeholder="Drop your comment"></textarea>
    <button onclick="submitComment()">Send</button>
</div>

<script>
// Data
let mediaList = JSON.parse(localStorage.getItem('mediaList')) || [];
let commentsList = JSON.parse(localStorage.getItem('commentsList')) || [];
let usersList = JSON.parse(localStorage.getItem('usersList')) || [];

// Super Admin
const SUPER_ADMIN = { username: "superadmin", password: "Mihayo@2021" };

function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;

    if (username === SUPER_ADMIN.username && password === SUPER_ADMIN.password) {
        localStorage.setItem('currentUser', JSON.stringify({role: 'super_admin', name: 'Super Admin'}));
        showSuperDashboard();
        return;
    }

    const saved = localStorage.getItem('currentUser');
    if (saved) {
        showUserDashboard();
    } else {
        alert("Please register your self.");
    }
}

function handleRegister() {
    const fullName = document.getElementById('regFullName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const year = document.getElementById('regYear').value;

    if (!fullName || !phone || !year) return alert("Fill all spaces");

    const userData = {name: fullName, phone: phone, year: year, registeredAt: new Date().toLocaleString()};
    usersList.push(userData);
    localStorage.setItem('usersList', JSON.stringify(usersList));

    localStorage.setItem('currentUser', JSON.stringify({role: 'user', name: fullName}));
    showUserDashboard();
}

function showSuperDashboard() {
    hideAll();
    document.getElementById('superDashboard').style.display = 'block';
    loadMedia();
    loadUsersTable();
    loadComments();
}

function showUserDashboard() {
    hideAll();
    document.getElementById('userDashboard').style.display = 'block';
    loadUserMedia();
}

function hideAll() {
    document.querySelectorAll('.container').forEach(el => el.style.display = 'none');
}

function logout() {
    localStorage.removeItem('currentUser');
    hideAll();
    document.getElementById('loginPage').style.display = 'block';
}

// Media
function uploadMedia() {
    const file = document.getElementById('uploadFile').files[0];
    if (!file) return alert("Chagua faili");
    const url = URL.createObjectURL(file);
    mediaList.push({id: Date.now(), url, type: file.type.startsWith('image') ? 'image' : 'video', name: file.name});
    localStorage.setItem('mediaList', JSON.stringify(mediaList));
    loadMedia();
    alert("Uploaded!");
}

function loadMedia() {
    const grid = document.getElementById('mediaGrid');
    grid.innerHTML = '';
    mediaList.forEach(m => {
        const div = document.createElement('div');
        div.className = 'media-card';
        div.innerHTML = `
            ${m.type === 'image' ? `<img src="${m.url}">` : `<video src="${m.url}" controls></video>`}
            <a href="${m.url}" download="${m.name}" class="download-btn">⬇ Download</a>
            <button onclick="deleteMedia(${m.id})" class="delete-btn">🗑</button>
        `;
        grid.appendChild(div);
    });
}

function deleteMedia(id) {
    if (confirm("Do you want to delete this media?")) {
        mediaList = mediaList.filter(m => m.id !== id);
        localStorage.setItem('mediaList', JSON.stringify(mediaList));
        loadMedia();
    }
}

function loadUserMedia() {
    const grid = document.getElementById('userMediaGrid');
    grid.innerHTML = '';
    mediaList.forEach(m => {
        const div = document.createElement('div');
        div.className = 'media-card';
        div.innerHTML = m.type === 'image' ? `<img src="${m.url}">` : `<video src="${m.url}" controls></video>`;
        div.innerHTML += `<a href="${m.url}" download="${m.name}" style="display:block;text-align:center;margin:8px;color:#4CAF50;">⬇ Download</a>`;
        grid.appendChild(div);
    });
}

// Users
function loadUsersTable() {
    const tbody = document.querySelector('#usersTable tbody') || document.createElement('tbody');
    if (!document.getElementById('usersTable')) return;
    tbody.innerHTML = '';
    usersList.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${u.name}</td><td>${u.phone}</td><td>${u.year}</td>`;
        tbody.appendChild(tr);
    });
}

// Comments with Reply
function submitComment() {
    const text = document.getElementById('userComment').value.trim();
    if (!text) return alert("Andika maoni");
    commentsList.push({id: Date.now(), text: text, from: "User", time: new Date().toLocaleString(), reply: ""});
    localStorage.setItem('commentsList', JSON.stringify(commentsList));
    document.getElementById('userComment').value = '';
    alert("Your comment have been set!");
    if (document.getElementById('superDashboard').style.display !== 'none') loadComments();
}

function loadComments() {
    const container = document.getElementById('commentsList');
    container.innerHTML = '';
    commentsList.forEach((c, index) => {
        const div = document.createElement('div');
        div.className = 'comment';
        div.innerHTML = `
            <p><strong>Comments from User:</strong> ${c.text}</p>
            <small>${c.time}</small>
            <textarea placeholder="Andika jibu hapa..." onblur="saveReply(${index}, this.value)">${c.reply || ''}</textarea>
        `;
        container.appendChild(div);
    });
}

function saveReply(index, replyText) {
    if (commentsList[index]) {
        commentsList[index].reply = replyText;
        localStorage.setItem('commentsList', JSON.stringify(commentsList));
    }
}

function showMessage(id, text, type) {
    const el = document.getElementById(id);
    el.className = `message ${type}`;
    el.style.display = 'block';
    el.innerHTML = text;
    setTimeout(() => el.style.display = 'none', 5000);
}

function showLogin() {
    hideAll();
    document.getElementById('loginPage').style.display = 'block';
}

function showRegister() {
    hideAll();
    document.getElementById('registerPage').style.display = 'block';
}

// Start App
if (localStorage.getItem('currentUser')) {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (user.role === 'super_admin') showSuperDashboard();
    else showUserDashboard();
} else {
    showLogin();
}
</script>
</body>
</html>
