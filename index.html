<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihayo Media Platform</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #ce8f07, #f39108); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .form-container, .dashboard {
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-bottom: 20px; color: #333; }
        button { 
            padding: 12px 20px; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
        }
        .logout-btn {
            background: #ff4444;
            padding: 8px 16px;
        }
        .message { 
            padding: 12px; 
            margin: 15px 0; 
            border-radius: 8px; 
            display: none; 
            font-weight: bold; 
            text-align: center; 
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<!-- Login Page -->
<div class="form-container" id="loginPage">
    <h2>Mihayo Media Platform</h2>
    <div id="loginMessage" class="message"></div>
    
    <div class="form-group">
        <label>Jina la Mtumiaji</label>
        <input type="text" id="loginUsername" placeholder="superadmin">
    </div>
    <div class="form-group">
        <label>Nenosiri</label>
        <input type="password" id="loginPassword">
    </div>
    <button onclick="handleLogin()">Ingia</button>
    
    <p style="text-align:center; margin-top:25px;">
        Huna akaunti? <a href="#" onclick="showRegister()">Jisajili hapa</a>
    </p>
</div>

<!-- Register Page -->
<div class="form-container" id="registerPage" style="display:none;">
    <h2>Jisajili (Mara Moja Tu)</h2>
    <div id="registerMessage" class="message"></div>
    
    <div class="form-group">
        <label>Jina Kamili</label>
        <input type="text" id="regFullName" placeholder="Aron Clement">
    </div>
    <div class="form-group">
        <label>Namba ya Simu</label>
        <input type="tel" id="regPhone" placeholder="0712345678">
    </div>
    <div class="form-group">
        <label>Mwaka Uliomaliza</label>
        <input type="number" id="regYear" placeholder="2024">
    </div>
    <button onclick="handleRegister()">Sajili na Ingia</button>
    
    <p style="text-align:center; margin-top:20px;">
        <a href="#" onclick="showLogin()">Rudi kwenye Login</a>
    </p>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboardPage" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 id="dashboardTitle">Dashboard</h2>
        <button class="logout-btn" onclick="logout()">🚪 Toka</button>
    </div>
    <div id="dashboardContent">
        <p>Karibu! Hapa utaona picha na video baadaye.</p>
    </div>
</div>

<script>
// Super Admin
const SUPER_ADMIN = { username: "superadmin", password: "MIhayo@2021" };

function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;

    if (!username || !password) {
        showMessage('loginMessage', 'Jaza username na nenosiri!', 'error');
        return;
    }

    if (username === SUPER_ADMIN.username && password === SUPER_ADMIN.password) {
        localStorage.setItem('currentUser', JSON.stringify({role: 'super_admin', name: 'Super Admin'}));
        showDashboard();
        return;
    }

    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        showDashboard();
    } else {
        showMessage('loginMessage', 'Huja sajili bado. Tafadhali jisajili.', 'error');
    }
}

function handleRegister() {
    const fullName = document.getElementById('regFullName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const year = document.getElementById('regYear').value;

    if (!fullName || !phone || !year) {
        showMessage('registerMessage', 'Jaza sehemu zote!', 'error');
        return;
    }

    localStorage.setItem('currentUser', JSON.stringify({name: fullName, role: "user"}));
    showMessage('registerMessage', '✅ Usajili umefanikiwa!', 'success');
    setTimeout(showDashboard, 1500);
}

function showDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('registerPage').style.display = 'none';
    document.getElementById('dashboardPage').style.display = 'block';

    const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
    const title = document.getElementById('dashboardTitle');
    title.textContent = user.role === 'super_admin' ? 'Super Admin Dashboard' : 'Dashboard ya Mtumiaji';
}

function logout() {
    localStorage.removeItem('currentUser');
    document.getElementById('dashboardPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'block';
}

function showMessage(id, text, type) {
    const el = document.getElementById(id);
    el.className = `message ${type}`;
    el.style.display = 'block';
    el.innerHTML = text;
    setTimeout(() => el.style.display = 'none', 5000);
}

function showLogin() {
    document.getElementById('registerPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'block';
}

function showRegister() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('registerPage').style.display = 'block';
}

// Start
showLogin();
</script>
</body>
</html>
