<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihayo Media Platform</title>
  
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ce8f07, #f39108);
            min-height: 100vh;
            padding: 20px;
        }
        .login-form, .register-form {
            max-width: 450px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.25);
        }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }
        .message {
            padding: 14px;
            margin: 15px 0;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            text-align: center;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="login-form">
        <h2>Mihayo Media Platform</h2>
        <div id="loginMessage" class="message"></div>
        <div class="form-group">
            <label>Jina la Mtumiaji (Username)</label>
            <input type="text" id="loginUsername" placeholder="aron123">
        </div>
        <div class="form-group">
            <label>Nenosiri</label>
            <input type="password" id="loginPassword">
        </div>
        <button onclick="handleLogin()">Ingia</button>
        <p style="text-align:center; margin-top:25px;">
            Huna akaunti? <a href="#" onclick="showRegister()">Jisajili hapa</a>
        </p>
    </div>
</div>

<div id="registerPage" style="display:none;">
    <div class="register-form">
        <h2>Jisajili</h2>
        <div id="registerMessage" class="message"></div>
        <div class="form-group">
            <label>Jina la Mtumiaji (Username)</label>
            <input type="text" id="regUsername" placeholder="superadmin">
        </div>
        <div class="form-group">
            <label>Nenosiri (angalau herufi 6)</label>
            <input type="password" id="regPassword">
        </div>
        <div class="form-group">
            <label>Jina lako kamili</label>
            <input type="text" id="regFullName" placeholder="Aron Clement">
        </div>
        <button onclick="handleRegister()">Sajili Akaunti</button>
        <p style="text-align:center; margin-top:25px;">
            Tayari una akaunti? <a href="#" onclick="showLogin()">Ingia hapa</a>
        </p>
    </div>
</div>

<script>
// ====================== FIREBASE INITIALIZATION ======================
const firebaseConfig = {
  apiKey: "AIzaSyD0rTfNVPAjtPFRQxT5SEhJaLBX40Z8q4g",
  authDomain: "mihayo-media-platform.firebaseapp.com",
  projectId: "mihayo-media-platform",
  storageBucket: "mihayo-media-platform.firebasestorage.app",
  messagingSenderId: "973572154003",
  appId: "1:973572154003:web:837f3abb7689c0706ce366"
};

// **Muhimu**: Initialize Firebase kwanza
firebase.initializeApp(firebaseConfig);

// Kisha tunaunda auth na db
const auth = firebase.auth();
const db = firebase.firestore();

// ====================== HELPER ======================
function usernameToEmail(username) {
    return username.trim().toLowerCase() + "@mihayo.local";
}

// ====================== REGISTER ======================
async function handleRegister() {
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const fullName = document.getElementById('regFullName').value.trim();

    if (!username || !password || !fullName) {
        showMessage('registerMessage', 'Tafadhali jaza sehemu zote!', 'error');
        return;
    }
    if (password.length < 6) {
        showMessage('registerMessage', 'Nenosiri lazima liwe na herufi 6 au zaidi!', 'error');
        return;
    }

    const email = usernameToEmail(username);

    try {
        showMessage('registerMessage', 'Inasajili...', 'info');

        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        await db.collection('users').doc(user.uid).set({
            username: username,
            fullName: fullName,
            email: email,
            role: username.toLowerCase() === "superadmin" ? "super_admin" : "user",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        showMessage('registerMessage', '✅ Akaunti imeundwa kikamilifu!<br>Sasa ingia.', 'success');
        setTimeout(showLogin, 2000);

    } catch (error) {
        console.error(error);
        showMessage('registerMessage', 'Hitilafu: ' + error.message, 'error');
    }
}

// ====================== LOGIN ======================
async function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!username || !password) {
        showMessage('loginMessage', 'Jaza username na nenosiri!', 'error');
        return;
    }

    const email = usernameToEmail(username);

    try {
        showMessage('loginMessage', 'Inaingia...', 'info');
        await auth.signInWithEmailAndPassword(email, password);
        alert("✅ Login umefanikiwa!");
        
    } catch (error) {
        console.error(error);
        showMessage('loginMessage', 'Hitilafu: ' + error.message, 'error');
    }
}

// ====================== UI FUNCTIONS ======================
function showMessage(elementId, text, type) {
    const el = document.getElementById(elementId);
    el.className = `message ${type}`;
    el.style.display = 'block';
    el.innerHTML = text;
    setTimeout(() => el.style.display = 'none', 6000);
}

function showLogin() {
    document.getElementById('registerPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'block';
}

function showRegister() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('registerPage').style.display = 'block';
}

// Anza na Login
showLogin();
</script>

</body>
</html>
