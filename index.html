<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihayo Media Platform</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #ce8f07, #f39108); min-height: 100vh; padding: 20px; }
        .container { max-width: 1100px; margin: 40px auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 15px 50px rgba(0,0,0,0.3); }
        h2 { margin-bottom: 20px; color: #333; }
        button { padding: 10px 18px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        .logout-btn { background: #ff4444; }
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .media-card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; position: relative; }
        .media-card img, .media-card video { width: 100%; height: 180px; object-fit: cover; }
        .download-btn { position: absolute; bottom: 8px; left: 8px; background: #4CAF50; }
        .delete-btn { position: absolute; top: 8px; right: 8px; background: #ff4444; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .message { padding: 12px; margin: 15px 0; border-radius: 8px; display: none; font-weight: bold; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<!-- Login Page -->
<div class="container" id="loginPage">
    <h2>Mihayo Media Platform</h2>
    <div id="loginMessage" class="message"></div>
    <div class="form-group"><label>Jina la Mtumiaji</label><input type="text" id="loginUsername" placeholder="superadmin"></div>
    <div class="form-group"><label>Nenosiri</label><input type="password" id="loginPassword"></div>
    <button onclick="handleLogin()" style="width:100%;">Ingia</button>
    <p style="text-align:center; margin-top:20px;">Huna akaunti? <a href="#" onclick="showRegister()">Jisajili hapa</a></p>
</div>

<!-- Register Page -->
<div class="container" id="registerPage" style="display:none;">
    <h2>Jisajili (Mara Moja Tu)</h2>
    <div id="registerMessage" class="message"></div>
    <div class="form-group"><label>Jina Kamili</label><input type="text" id="regFullName"></div>
    <div class="form-group"><label>Namba ya Simu</label><input type="tel" id="regPhone"></div>
    <div class="form-group"><label>Mwaka Uliomaliza</label><input type="number" id="regYear"></div>
    <button onclick="handleRegister()" style="width:100%;">Sajili na Ingia</button>
    <p style="text-align:center; margin-top:20px;"><a href="#" onclick="showLogin()">Rudi Login</a></p>
</div>

<!-- Super Admin Dashboard -->
<div class="container" id="superDashboard" style="display:none;">
    <div style="display:flex; justify-content:space-between;">
        <h2>Super Admin Panel</h2>
        <button class="logout-btn" onclick="logout()">🚪 Toka</button>
    </div>

    <h3>Upload Media</h3>
    <input type="file" id="uploadFile" accept="image/*,video/*">
    <button onclick="uploadMedia()">⬆ Upload</button>

    <h3>Media Zilizopakiwa</h3>
    <div class="media-grid" id="mediaGrid"></div>

    <h3>Orodha ya Watumiaji</h3>
    <table id="usersTable"><thead><tr><th>Jina</th><th>Simu</th><th>Mwaka</th></tr></thead><tbody></tbody></table>

    <h3>Maoni kutoka kwa Watumiaji</h3>
    <div id="commentsList"></div>
</div>

<!-- User Dashboard -->
<div class="container" id="userDashboard" style="display:none;">
    <div style="display:flex; justify-content:space-between;">
        <h2>Dashboard Yako</h2>
        <button class="logout-btn" onclick="logout()">🚪 Toka</button>
    </div>
    <div class="media-grid" id="userMediaGrid"></div>

    <h3>Tuma Maoni</h3>
    <textarea id="userComment" rows="3" placeholder="Andika maoni yako..."></textarea>
    <button onclick="submitComment()">Tuma Maoni</button>
</div>

<script>
// Data
let mediaList = JSON.parse(localStorage.getItem('mediaList')) || [];
let commentsList = JSON.parse(localStorage.getItem('commentsList')) || [];
let usersList = JSON.parse(localStorage.getItem('usersList')) || [];

// Super Admin
const SUPER_ADMIN = { username: "superadmin", password: "MIhayo@2021" };

function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;

    if (username === SUPER_ADMIN.username && password === SUPER_ADMIN.password) {
        localStorage.setItem('currentUser', JSON.stringify({role: 'super_admin', name: 'Super Admin'}));
        showSuperDashboard();
        return;
    }

    const saved = localStorage.getItem('currentUser');
    if (saved) {
        showUserDashboard();
    } else {
        alert("Huja sajili bado.");
    }
}

function handleRegister() {
    const fullName = document.getElementById('regFullName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const year = document.getElementById('regYear').value;

    if (!fullName || !phone || !year) return alert("Jaza sehemu zote");

    const userData = {name: fullName, phone: phone, year: year, registeredAt: new Date().toLocaleString()};
    usersList.push(userData);
    localStorage.setItem('usersList', JSON.stringify(usersList));

    localStorage.setItem('currentUser', JSON.stringify({role: 'user', name: fullName}));
    showUserDashboard();
}

function showSuperDashboard() {
    hideAll();
    document.getElementById('superDashboard').style.display = 'block';
    loadMedia();
    loadUsersTable();
    loadComments();
}

function showUserDashboard() {
    hideAll();
    document.getElementById('userDashboard').style.display = 'block';
    loadUserMedia();
}

function hideAll() {
    document.querySelectorAll('.container').forEach(el => el.style.display = 'none');
}

function logout() {
    localStorage.removeItem('currentUser');
    hideAll();
    document.getElementById('loginPage').style.display = 'block';
}

// Media Functions
function uploadMedia() {
    const file = document.getElementById('uploadFile').files[0];
    if (!file) return alert("Chagua faili");

    const url = URL.createObjectURL(file);
    mediaList.push({id: Date.now(), url: url, type: file.type.startsWith('image') ? 'image' : 'video', name: file.name});
    localStorage.setItem('mediaList', JSON.stringify(mediaList));
    loadMedia();
    alert("✅ Imepakiwa!");
}

function loadMedia() {
    const grid = document.getElementById('mediaGrid');
    grid.innerHTML = '';
    mediaList.forEach(m => {
        const div = document.createElement('div');
        div.className = 'media-card';
        div.innerHTML = `
            ${m.type === 'image' ? `<img src="${m.url}">` : `<video src="${m.url}" controls></video>`}
            <a href="${m.url}" download="${m.name}" class="download-btn" style="position:absolute;bottom:8px;left:8px;background:#4CAF50;padding:5px 10px;color:white;">⬇ Download</a>
            <button onclick="deleteMedia(${m.id})" class="delete-btn">🗑</button>
        `;
        grid.appendChild(div);
    });
}

function deleteMedia(id) {
    if (confirm("Unataka kufuta?")) {
        mediaList = mediaList.filter(m => m.id !== id);
        localStorage.setItem('mediaList', JSON.stringify(mediaList));
        loadMedia();
    }
}

function loadUserMedia() {
    const grid = document.getElementById('userMediaGrid');
    grid.innerHTML = '';
    mediaList.forEach(m => {
        const div = document.createElement('div');
        div.className = 'media-card';
        div.innerHTML = m.type === 'image' ? `<img src="${m.url}">` : `<video src="${m.url}" controls></video>`;
        div.innerHTML += `<a href="${m.url}" download="${m.name}" style="display:block;text-align:center;margin:8px;color:#4CAF50;">⬇ Download</a>`;
        grid.appendChild(div);
    });
}

// Users Table
function loadUsersTable() {
    const tbody = document.querySelector('#usersTable tbody');
    tbody.innerHTML = '';
    usersList.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${u.name}</td><td>${u.phone}</td><td>${u.year}</td>`;
        tbody.appendChild(tr);
    });
}

// Comments
function submitComment() {
    const text = document.getElementById('userComment').value.trim();
    if (!text) return alert("Andika maoni");
    commentsList.push({text: text, from: "User", time: new Date().toLocaleString(), reply: ""});
    localStorage.setItem('commentsList', JSON.stringify(commentsList));
    document.getElementById('userComment').value = '';
    alert("✅ Maoni yametumwa!");
}

function loadComments() {
    const container = document.getElementById('commentsList');
    container.innerHTML = '';
    commentsList.forEach((c, index) => {
        const div = document.createElement('div');
        div.style.border = "1px solid #ddd";
        div.style.padding = "10px";
        div.style.margin = "10px 0";
        div.innerHTML = `
            <p><strong>Maoni:</strong> ${c.text}</p>
            <small>${c.time}</small><br>
            <textarea placeholder="Jibu hapa..." onblur="saveReply(${index}, this.value)">${c.reply || ''}</textarea>
        `;
        container.appendChild(div);
    });
}

function saveReply(index, reply) {
    commentsList[index].reply = reply;
    localStorage.setItem('commentsList', JSON.stringify(commentsList));
}

// Show/Hide
function showLogin() {
    hideAll();
    document.getElementById('loginPage').style.display = 'block';
}

function showRegister() {
    hideAll();
    document.getElementById('registerPage').style.display = 'block';
}

// Start
if (localStorage.getItem('currentUser')) {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (user.role === 'super_admin') showSuperDashboard();
    else showUserDashboard();
} else {
    showLogin();
}
</script>
</body>
</html>
