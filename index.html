<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihayo Media Platform - Test</title>
    <style>
        body { font-family: Arial; background: #f39108; color: white; text-align: center; padding: 50px; }
        button { padding: 15px 30px; font-size: 18px; margin: 10px; }
        .message { margin: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Test Mode - Mihayo Media</h1>
    <p>Jaribu buttons hizi kwanza</p>
    
    <button onclick="testLogin()">Ingia kama Super Admin</button>
    <button onclick="testRegister()">Jisajili</button>

    <div id="message" class="message"></div>

    <script>
        function testLogin() {
            document.getElementById('message').innerHTML = "✅ Super Admin Login Test - Inafanya kazi!";
            alert("Super Admin Login inafanya kazi! (Test Mode)");
        }

        function testRegister() {
            document.getElementById('message').innerHTML = "✅ Registration Test - Inafanya kazi!";
            alert("Jisajili button inafanya kazi! (Test Mode)");
        }
    </script>
</body>
</html>
