<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihayo Media Platform</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #ce8f07, #f39108); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container, .dashboard {
            max-width: 1100px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }
        h2 { margin-bottom: 20px; color: #333; }
        button { 
            padding: 10px 18px; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
        }
        .logout-btn { background: #ff4444; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .message { padding: 12px; margin: 15px 0; border-radius: 8px; display: none; font-weight: bold; text-align: center; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<!-- Login & Register Pages (zimeachwa kama zilivyo) -->
<!-- ... (unaweza kuweka code ya login/register kutoka hapo awali) ... -->

<!-- Super Admin Dashboard -->
<div class="dashboard" id="superDashboard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>Super Admin Panel</h2>
        <button class="logout-btn" onclick="logout()">🚪 Toka</button>
    </div>
    
    <h3>Watumiaji Wote</h3>
    <table id="usersTable">
        <thead><tr><th>Jina</th><th>Simu</th><th>Mwaka</th><th>Muda wa Kuingia</th></tr></thead>
        <tbody></tbody>
    </table>

    <h3>Upload Picha au Video</h3>
    <input type="file" id="uploadFile" accept="image/*,video/*">
    <button onclick="uploadMedia()">⬆ Upload</button>

    <h3>Maoni kutoka kwa Watumiaji</h3>
    <div id="commentsList"></div>
</div>

<!-- Normal User Dashboard -->
<div class="dashboard" id="userDashboard" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 id="userTitle">Dashboard</h2>
        <button class="logout-btn" onclick="logout()">🚪 Toka</button>
    </div>
    
    <h3>Picha na Video</h3>
    <div id="mediaGrid"></div>

    <h3>Tuma Maoni</h3>
    <textarea id="userComment" rows="3" placeholder="Andika maoni yako..."></textarea>
    <button onclick="submitComment()">Tuma Maoni</button>
</div>

<script>
// Super Admin Credentials
const SUPER_ADMIN = { username: "superadmin", password: "MIhayo@2021" };

// Handle Login (kama ilivyokuwa)
function handleLogin() {
    const username = document.getElementById('loginUsername').value.trim().toLowerCase();
    const password = document.getElementById('loginPassword').value;

    if (username === SUPER_ADMIN.username && password === SUPER_ADMIN.password) {
        localStorage.setItem('currentUser', JSON.stringify({role: 'super_admin', name: 'Super Admin'}));
        showSuperDashboard();
        return;
    }

    const savedUser = localStorage.getItem('currentUser');
    if (savedUser) {
        showUserDashboard();
    } else {
        alert("Huja sajili bado. Tafadhali jisajili.");
    }
}

function showSuperDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('superDashboard').style.display = 'block';
    loadUsers();
}

function showUserDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('userDashboard').style.display = 'block';
}

// Logout
function logout() {
    localStorage.removeItem('currentUser');
    location.reload();
}

// Placeholder functions (tutazijaza baadaye)
function loadUsers() { console.log("Loading users..."); }
function uploadMedia() { alert("Upload inafanya kazi (tutaiweka Firestore baadaye)"); }
function submitComment() { alert("Maoni yako yametumwa!"); }

showLogin(); // Anza na login page
</script>
</body>
</html>
