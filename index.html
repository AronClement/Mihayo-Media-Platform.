<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihayo Media Platform</title>
  
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #ce8f07, #f39108); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .form-container {
            max-width: 460px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        .form-group input { 
            width: 100%; 
            padding: 13px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 17px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message { 
            padding: 14px; 
            margin: 15px 0; 
            border-radius: 8px; 
            display: none; 
            font-weight: bold; 
            text-align: center; 
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            font-size: 20px;
            flex-direction: column;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f39108;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div>Inaandaa platform... Tafadhali subiri</div>
    <div id="errorDetail" style="font-size: 14px; margin-top: 20px; color: #ff6b6b;"></div>
</div>

<div class="form-container" id="loginPage" style="display:none;">
    <h2>Mihayo Media Platform</h2>
    <div id="loginMessage" class="message"></div>
    <div class="form-group">
        <label>Jina la Mtumiaji (Username)</label>
        <input type="text" id="loginUsername" placeholder="superadmin">
    </div>
    <div class="form-group">
        <label>Nenosiri</label>
        <input type="password" id="loginPassword">
    </div>
    <button onclick="handleLogin()" id="loginBtn">Ingia</button>
    <p style="text-align:center; margin-top:25px;">
        Huna akaunti? <a href="#" onclick="showRegister()">Jisajili hapa</a>
    </p>
</div>

<div class="form-container" id="registerPage" style="display:none;">
    <h2>Jisajili</h2>
    <div id="registerMessage" class="message"></div>
    <div class="form-group">
        <label>Jina la Mtumiaji (Username)</label>
        <input type="text" id="regUsername" placeholder="superadmin">
    </div>
    <div class="form-group">
        <label>Nenosiri (herufi 6+)</label>
        <input type="password" id="regPassword">
    </div>
    <div class="form-group">
        <label>Jina Kamili</label>
        <input type="text" id="regFullName" placeholder="Aron Clement">
    </div>
    <button onclick="handleRegister()" id="registerBtn">Sajili Akaunti</button>
    <p style="text-align:center; margin-top:25px;">
        Una akaunti? <a href="#" onclick="showLogin()">Ingia</a>
    </p>
</div>

<script>
// ====================== FIREBASE CONFIG ======================
const firebaseConfig = {
    apiKey: "AIzaSyD0rTfNVPAjtPFRQxT5SEhJaLBX40Z8q4g",
    authDomain: "mihayo-media-platform.firebaseapp.com",
    projectId: "mihayo-media-platform",
    storageBucket: "mihayo-media-platform.firebasestorage.app",
    messagingSenderId: "973572154003",
    appId: "1:973572154003:web:837f3abb7689c0706ce366"
};

// ====================== GLOBAL VARIABLES ======================
let auth = null;
let db = null;
let appInitialized = false;

// ====================== FIREBASE INITIALIZATION ======================
function initFirebase() {
    try {
        console.log("Checking Firebase...");
        console.log("Firebase available:", typeof firebase !== 'undefined');
        
        if (typeof firebase === 'undefined') {
            throw new Error("Firebase SDK haijaload. Angalia connection yako ya internet.");
        }
        
        // Initialize Firebase if not already initialized
        if (!firebase.apps.length) {
            console.log("Initializing Firebase...");
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase initialized successfully");
        } else {
            console.log("Firebase already initialized");
        }
        
        auth = firebase.auth();
        db = firebase.firestore();
        appInitialized = true;
        
        console.log("Auth and Firestore ready");
        return true;
        
    } catch (error) {
        console.error("Firebase initialization error:", error);
        document.getElementById('errorDetail').innerHTML = "Error: " + error.message;
        return false;
    }
}

// ====================== HELPER FUNCTIONS ======================
function usernameToEmail(username) {
    return username.trim().toLowerCase() + "@mihayomedia.example.com";
}

function showMessage(id, text, type) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = `message ${type}`;
    el.style.display = 'block';
    el.innerHTML = text;
    setTimeout(() => {
        if (el) el.style.display = 'none';
    }, 6000);
}

function disableButton(btnId, disabled) {
    const btn = document.getElementById(btnId);
    if (btn) btn.disabled = disabled;
}

// ====================== REGISTER FUNCTION ======================
async function handleRegister() {
    if (!appInitialized || !auth) {
        showMessage('registerMessage', 'Mfumo unaanza, tafadhali subiri sekunde chache...', 'error');
        return;
    }
    
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const fullName = document.getElementById('regFullName').value.trim();

    if (!username || !password || !fullName) {
        return showMessage('registerMessage', 'Jaza sehemu zote!', 'error');
    }
    if (password.length < 6) {
        return showMessage('registerMessage', 'Nenosiri lazima liwe na herufi 6 au zaidi!', 'error');
    }
    if (username.length < 3) {
        return showMessage('registerMessage', 'Jina la mtumiaji lazima liwe na herufi 3 au zaidi!', 'error');
    }

    try {
        disableButton('registerBtn', true);
        showMessage('registerMessage', 'Inasajili... Tafadhali subiri', 'info');
        
        const email = usernameToEmail(username);
        
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        await db.collection('users').doc(user.uid).set({
            username: username,
            fullName: fullName,
            email: email,
            role: username.toLowerCase() === "superadmin" ? "super_admin" : "user",
            createdAt: new Date()
        });

        showMessage('registerMessage', '✅ Akaunti imeundwa kikamilifu! Sasa unaweza kuingia.', 'success');
        
        setTimeout(() => {
            showLogin();
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regFullName').value = '';
        }, 2000);

    } catch (error) {
        console.error("Registration error:", error);
        
        let errorMessage = "Hitilafu wakati wa kusajili: ";
        if (error.code === 'auth/email-already-in-use') {
            errorMessage += "Jina la mtumiaji tayari lipo. Tumia jina tofauti.";
        } else if (error.code === 'auth/invalid-email') {
            errorMessage += "Barua pepe si sahihi.";
        } else if (error.code === 'auth/weak-password') {
            errorMessage += "Nenosiri dhaifu. Tumia herufi 6 au zaidi.";
        } else {
            errorMessage += error.message;
        }
        
        showMessage('registerMessage', errorMessage, 'error');
    } finally {
        disableButton('registerBtn', false);
    }
}

// ====================== LOGIN FUNCTION ======================
async function handleLogin() {
    if (!appInitialized || !auth) {
        showMessage('loginMessage', 'Mfumo unaanza, tafadhali subiri sekunde chache...', 'error');
        return;
    }
    
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!username || !password) {
        return showMessage('loginMessage', 'Tafadhali jaza username na nenosiri!', 'error');
    }

    try {
        disableButton('loginBtn', true);
        showMessage('loginMessage', 'Inaingia... Tafadhali subiri', 'info');
        
        const email = usernameToEmail(username);
        
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        
        const userDoc = await db.collection('users').doc(userCredential.user.uid).get();
        
        if (userDoc.exists) {
            const userData = userDoc.data();
            showMessage('loginMessage', `✅ Karibu ${userData.fullName || username}!`, 'success');
            
            setTimeout(() => {
                alert(`Karibu sana ${userData.fullName || username} kwenye Mihayo Media Platform!`);
            }, 1000);
        } else {
            showMessage('loginMessage', '⚠️ Akaunti iko lakini data haipo. Wasiliana na msimamizi.', 'error');
        }
        
    } catch (error) {
        console.error("Login error:", error);
        
        let errorMessage = "Hitilafu wakati wa kuingia: ";
        if (error.code === 'auth/user-not-found') {
            errorMessage += "Username au nenosiri si sahihi.";
        } else if (error.code === 'auth/wrong-password') {
            errorMessage += "Nenosiri si sahihi.";
        } else if (error.code === 'auth/invalid-email') {
            errorMessage += "Barua pepe si sahihi.";
        } else if (error.code === 'auth/too-many-requests') {
            errorMessage += "Majaribio mengi. Jaribu baadaye.";
        } else {
            errorMessage += error.message;
        }
        
        showMessage('loginMessage', errorMessage, 'error');
    } finally {
        disableButton('loginBtn', false);
    }
}

// ====================== UI NAVIGATION ======================
function showLogin() {
    document.getElementById('registerPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'block';
    const loginMsg = document.getElementById('loginMessage');
    if (loginMsg) loginMsg.style.display = 'none';
}

function showRegister() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('registerPage').style.display = 'block';
    const regMsg = document.getElementById('registerMessage');
    if (regMsg) regMsg.style.display = 'none';
}

// ====================== START APPLICATION ======================
function startApplication() {
    console.log("Starting application...");
    
    // Initialize Firebase
    const success = initFirebase();
    
    if (success) {
        // Hide loading overlay after 1 second
        setTimeout(() => {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('loginPage').style.display = 'block';
            
            // Check if user is already logged in
            if (auth && auth.onAuthStateChanged) {
                auth.onAuthStateChanged((user) => {
                    if (user) {
                        console.log("User already logged in:", user.email);
                    }
                });
            }
        }, 1000);
    } else {
        // Show error but keep loading overlay visible with error message
        document.getElementById('errorDetail').innerHTML = 'Jaribu ku refresh ukurasa. Kama tatizo linaendelea, angalia internet connection.';
    }
}

// Start when page loads
window.addEventListener('load', startApplication);
</script>
</body>
</html>
