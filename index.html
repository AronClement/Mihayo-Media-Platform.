<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mihayo Media Platform</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-storage-compat.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ce8f07,#f39108);
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px;
background:#667eea;
color:white;
border:none;
cursor:pointer;
}

.media-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.media-card img,
.media-card video{
width:100%;
height:200px;
object-fit:cover;
}

</style>
</head>

<body>

<div id="loginPage" class="container">

<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">

<button onclick="login()">Login</button>

<p>Huna akaunti? <a href="#" onclick="showRegister()">Register</a></p>

</div>

<div id="registerPage" class="container" style="display:none">

<h2>Register</h2>

<input type="text" id="regName" placeholder="Full Name">
<input type="email" id="regEmail" placeholder="Email">
<input type="password" id="regPassword" placeholder="Password">

<button onclick="register()">Register</button>

<p>Tayari una akaunti? <a href="#" onclick="showLogin()">Login</a></p>

</div>

<div id="dashboard" class="container" style="display:none">

<h2>Media Platform</h2>

<button onclick="logout()">Logout</button>

<h3>Upload Media (Admin)</h3>

<input type="file" id="fileInput">
<button onclick="uploadMedia()">Upload</button>

<h3>Media Files</h3>

<div id="mediaGrid" class="media-grid"></div>

</div>


<script>

// FIREBASE CONFIG

const firebaseConfig = {
apiKey: "AIzaSyD0rTfNVPAjtPFRQxT5SEhJaLBX40Z8q4g",
authDomain: "mihayo-media-platform.firebaseapp.com",
projectId: "mihayo-media-platform",
storageBucket: "mihayo-media-platform.firebasestorage.app",
messagingSenderId: "973572154003",
appId: "1:973572154003:web:837f3abb7689c0706ce366",
measurementId: "G-LBCPY675S2"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();


// LOGIN

async function login(){

const email=document.getElementById("loginEmail").value
const password=document.getElementById("loginPassword").value

try{

await auth.signInWithEmailAndPassword(email,password)

showDashboard()

}catch(e){

alert("Login failed")

}

}


// REGISTER

async function register(){

const email=document.getElementById("regEmail").value
const password=document.getElementById("regPassword").value
const name=document.getElementById("regName").value

try{

const user=await auth.createUserWithEmailAndPassword(email,password)

await db.collection("users").doc(user.user.uid).set({

email:email,
name:name,
role:"user",
createdAt:firebase.firestore.FieldValue.serverTimestamp()

})

alert("Account created")

showLogin()

}catch(e){

alert(e.message)

}

}


// LOGOUT

function logout(){

auth.signOut()

showLogin()

}


// UPLOAD MEDIA

async function uploadMedia(){

const file=document.getElementById("fileInput").files[0]

if(!file){

alert("Select file")

return

}

const filename=Date.now()+"_"+file.name

const ref=storage.ref("media/"+filename)

const snap=await ref.put(file)

const url=await snap.ref.getDownloadURL()

await db.collection("media").add({

url:url,
type:file.type.startsWith("image")?"image":"video",
filename:filename,
createdAt:firebase.firestore.FieldValue.serverTimestamp()

})

loadMedia()

}


// LOAD MEDIA

async function loadMedia(){

const grid=document.getElementById("mediaGrid")

grid.innerHTML=""

const snap=await db.collection("media").orderBy("createdAt","desc").get()

snap.forEach(doc=>{

const data=doc.data()

let media=""

if(data.type==="image"){

media=`<img src="${data.url}">`

}else{

media=`<video controls src="${data.url}"></video>`

}

grid.innerHTML+=`

<div class="media-card">

${media}

<a href="${data.url}" download>

<button>Download</button>

</a>

</div>

`

})

}


// SHOW PAGES

function showLogin(){

document.getElementById("loginPage").style.display="block"
document.getElementById("registerPage").style.display="none"
document.getElementById("dashboard").style.display="none"

}

function showRegister(){

document.getElementById("loginPage").style.display="none"
document.getElementById("registerPage").style.display="block"

}

function showDashboard(){

document.getElementById("loginPage").style.display="none"
document.getElementById("registerPage").style.display="none"
document.getElementById("dashboard").style.display="block"

loadMedia()

}


// AUTO LOGIN

auth.onAuthStateChanged(user=>{

if(user){

showDashboard()

}

})

</script>

</body>
</html>
