<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihayo Media Platform</title>
  
    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.24.0/firebase-firestore-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #ce8f07, #f39108); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .form-container {
            max-width: 480px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-bottom: 30px; color: #333; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        .form-group input { 
            width: 100%; 
            padding: 13px; 
            border: 2px solid #ddd; 
            border-radius: 8px; 
            font-size: 16px; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 17px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .message { 
            padding: 14px; 
            margin: 15px 0; 
            border-radius: 8px; 
            display: none; 
            font-weight: bold; 
            text-align: center; 
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="form-container" id="loginPage">
    <h2>Mihayo Media Platform</h2>
    <div id="loginMessage" class="message"></div>
    
    <div class="form-group">
        <label>Jina la Mtumiaji</label>
        <input type="text" id="loginUsername" placeholder="superadmin">
    </div>
    <div class="form-group">
        <label>Nenosiri</label>
        <input type="password" id="loginPassword">
    </div>
    <button onclick="handleLogin()">Ingia</button>
    
    <p style="text-align:center; margin-top:25px;">
        Huna akaunti? <a href="#" onclick="showRegister()">Jisajili hapa</a>
    </p>
</div>

<div class="form-container" id="registerPage" style="display:none;">
    <h2>Jisajili (Mara Moja Tu)</h2>
    <div id="registerMessage" class="message"></div>
    
    <div class="form-group">
        <label>Jina Kamili</label>
        <input type="text" id="regFullName" placeholder="Aron Clement">
    </div>
    <div class="form-group">
        <label>Namba ya Simu</label>
        <input type="tel" id="regPhone" placeholder="0712345678">
    </div>
    <div class="form-group">
        <label>Mwaka Uliomaliza</label>
        <input type="number" id="regYear" placeholder="2024">
    </div>
    <button onclick="handleRegister()">Sajili na Ingia</button>
    
    <p style="text-align:center; margin-top:20px;">
        <a href="#" onclick="showLogin()">Rudi kwenye Login</a>
    </p>
</div>

<script>
console.log("App inaanza...");

// Subiri kila kitu kipakie
window.onload = function() {
    console.log("Window loaded - Checking Firebase...");

    if (typeof firebase === "undefined") {
        console.error("Firebase haijapakuliwa");
        alert("Firebase haijaload vizuri.\n\nTafadhali:\n1. Angalia mtandao wako\n2. Refresh ukurasa (Ctrl + Shift + R)");
        return;
    }

    console.log("✅ Firebase imepatikana!");

    const firebaseConfig = {
      apiKey: "AIzaSyD0rTfNVPAjtPFRQxT5SEhJaLBX40Z8q4g",
      authDomain: "mihayo-media-platform.firebaseapp.com",
      projectId: "mihayo-media-platform",
      storageBucket: "mihayo-media-platform.firebasestorage.app",
      messagingSenderId: "973572154003",
      appId: "1:973572154003:web:837f3abb7689c0706ce366"
    };

    try {
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        console.log("✅ Firebase initialized successfully");
    } catch (e) {
        console.error("Firebase initialization failed", e);
    }

    const SUPER_ADMIN = { username: "superadmin", password: "MIhayo@2021" };

    window.handleLogin = function() {
        const username = document.getElementById('loginUsername').value.trim().toLowerCase();
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            showMessage('loginMessage', 'Jaza username na nenosiri!', 'error');
            return;
        }

        if (username === SUPER_ADMIN.username && password === SUPER_ADMIN.password) {
            showMessage('loginMessage', '✅ Karibu Super Admin!', 'success');
            localStorage.setItem('currentUser', JSON.stringify({role: 'super_admin', name: 'Super Admin'}));
            setTimeout(() => alert("Karibu Super Admin!"), 800);
            return;
        }

        showMessage('loginMessage', 'Huja sajili au credentials si sahihi.', 'error');
    };

    window.handleRegister = async function() {
        const fullName = document.getElementById('regFullName').value.trim();
        const phone = document.getElementById('regPhone').value.trim();
        const year = document.getElementById('regYear').value;

        if (!fullName || !phone || !year) {
            showMessage('registerMessage', 'Jaza sehemu zote!', 'error');
            return;
        }

        showMessage('registerMessage', 'Inasajili...', 'info');

        // Hapa tutaweka tu localStorage kwa sasa (Firestore itaongezwa baadaye)
        localStorage.setItem('currentUser', JSON.stringify({name: fullName, role: "user"}));

        showMessage('registerMessage', '✅ Usajili umefanikiwa!', 'success');
        setTimeout(() => {
            alert(`Karibu ${fullName}!\nSasa unaweza kuona maudhui ya website.`);
        }, 1200);
    };

    function showMessage(id, text, type) {
        const el = document.getElementById(id);
        el.className = `message ${type}`;
        el.style.display = 'block';
        el.innerHTML = text;
        setTimeout(() => el.style.display = 'none', 5000);
    }

    function showLogin() {
        document.getElementById('registerPage').style.display = 'none';
        document.getElementById('loginPage').style.display = 'block';
    }

    function showRegister() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('registerPage').style.display = 'block';
    }

    showLogin();
    console.log("✅ App imeanza vizuri");
};
</script>
</body>
</html>
